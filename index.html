<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0052ff">
<title>CryptoMind AI</title>

<!-- Coinbase Mini App SDK -->
<script src="https://cdn.jsdelivr.net/npm/@coinbase/wallet-sdk@4/dist/index.js"></script>

<!-- Open Graph / Mini App Meta -->
<meta property="og:title" content="CryptoMind AI">
<meta property="og:description" content="AI-powered crypto analysis chatbot on Base">
<meta property="og:image" content="./splash.png">
<meta property="fc:frame" content="vNext">
<meta property="fc:frame:image" content="./splash.png">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050508;
  --s1: #0c0d14;
  --s2: #12131e;
  --border: #1e2035;
  --blue: #0052ff;
  --blue2: #4d84ff;
  --blue-glow: rgba(0,82,255,0.18);
  --green: #00d97e;
  --red: #ff4d6a;
  --gold: #ffc542;
  --text: #e8eaf5;
  --muted: #4a4e6a;
  --radius: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
}

/* Noise texture overlay */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:999; opacity:0.4;
}

/* Ambient blobs */
.blob1 {
  position:fixed; width:400px; height:400px; border-radius:50%;
  background: radial-gradient(circle, rgba(0,82,255,0.1) 0%, transparent 70%);
  top:-100px; right:-100px; pointer-events:none;
}
.blob2 {
  position:fixed; width:300px; height:300px; border-radius:50%;
  background: radial-gradient(circle, rgba(0,217,126,0.06) 0%, transparent 70%);
  bottom:-50px; left:-50px; pointer-events:none;
}

/* ── Layout ── */
.app {
  display: flex; flex-direction: column;
  height: 100dvh; max-width: 480px;
  margin: 0 auto; position: relative; z-index:1;
}

/* ── Header ── */
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(5,5,8,0.9);
  backdrop-filter: blur(20px);
  flex-shrink:0;
}

.logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink:0;
  box-shadow: 0 0 16px rgba(0,82,255,0.5);
}

.header-info { flex:1; }
.header-info h1 {
  font-family: 'Clash Display', sans-serif;
  font-size: 15px; font-weight: 600;
  letter-spacing: -0.3px; line-height:1;
}
.header-info p { font-size: 10px; color: var(--muted); margin-top:2px; }

.cb-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(0,82,255,0.12);
  border: 1px solid rgba(0,82,255,0.3);
  border-radius: 100px; padding: 5px 10px;
  font-size: 10px; color: var(--blue2); letter-spacing: 0.5px;
}
.cb-dot {
  width:5px; height:5px; border-radius:50%;
  background:var(--blue2);
  animation: pulse 2s infinite;
}
@keyframes pulse { 50%{opacity:0.3; transform:scale(0.8)} }

/* ── Quick chips ── */
.chips {
  display:flex; gap:7px; padding:10px 14px;
  overflow-x:auto; flex-shrink:0;
  border-bottom: 1px solid var(--border);
  scrollbar-width:none;
}
.chips::-webkit-scrollbar { display:none; }

.chip {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 6px 13px; font-size: 11px;
  color: var(--muted); cursor:pointer;
  white-space:nowrap; transition: all 0.2s;
  font-family: 'DM Mono', monospace;
}
.chip:hover, .chip:active {
  border-color: var(--blue);
  color: var(--blue2);
  background: var(--blue-glow);
}

/* ── Messages ── */
.messages {
  flex:1; overflow-y:auto; padding:16px 14px;
  display:flex; flex-direction:column; gap:14px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling: touch;
}
.messages::-webkit-scrollbar { width:3px; }
.messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* Welcome */
.welcome {
  display:flex; flex-direction:column;
  align-items:center; text-align:center;
  padding: 32px 20px; gap:14px;
  height:100%; justify-content:center;
}

.welcome-logo {
  width:64px; height:64px; border-radius:18px;
  background: linear-gradient(135deg, var(--blue), #0036cc);
  display:flex; align-items:center; justify-content:center;
  font-size:32px;
  box-shadow: 0 0 40px rgba(0,82,255,0.4);
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

.welcome h2 {
  font-family:'Clash Display',sans-serif;
  font-size:20px; font-weight:700;
}
.welcome p { font-size:12px; color:var(--muted); line-height:1.7; max-width:260px; }

.sugg-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:8px; width:100%; max-width:340px; margin-top:6px;
}
.sugg {
  background:var(--s1); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
  text-align:left; cursor:pointer;
  transition:all 0.2s; font-family:'DM Mono',monospace;
}
.sugg:hover, .sugg:active {
  border-color:var(--blue);
  background:var(--blue-glow);
  transform:translateY(-2px);
}
.sugg-icon { font-size:18px; margin-bottom:6px; display:block; }
.sugg-text { font-size:11px; color:var(--muted); line-height:1.4; }

/* Messages */
.msg { display:flex; gap:9px; animation:fadeUp 0.25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.msg.user { flex-direction:row-reverse; }

.av {
  width:30px; height:30px; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0; align-self:flex-end;
}
.av.ai { background:var(--blue); box-shadow:0 0 12px rgba(0,82,255,0.4); }
.av.user { background:var(--s2); border:1px solid var(--border); }

.bubble {
  max-width:78%;
  padding:11px 14px;
  border-radius:14px;
  font-size:13px; line-height:1.65;
}
.msg.ai .bubble {
  background:var(--s1);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
}
.msg.user .bubble {
  background: var(--blue);
  color:white;
  border-bottom-right-radius:4px;
  font-size:13px;
}

/* Markdown */
.bubble strong { color:var(--blue2); }
.bubble code {
  background:rgba(0,82,255,0.12);
  padding:1px 5px; border-radius:4px;
  font-size:11px; color:var(--gold);
}
.bubble h3 { color:var(--blue2); margin:8px 0 3px; font-size:13px; }
.bubble ul { padding-left:16px; }
.bubble li { margin:3px 0; }

/* Typing */
.typing .bubble {
  display:flex; gap:5px; align-items:center;
  padding:14px 16px;
}
.td {
  width:7px; height:7px; border-radius:50%;
  background:var(--muted);
  animation:tdBounce 1.1s infinite;
}
.td:nth-child(2) { animation-delay:0.18s; }
.td:nth-child(3) { animation-delay:0.36s; }
@keyframes tdBounce {
  0%,60%,100%{transform:translateY(0);background:var(--muted)}
  30%{transform:translateY(-7px);background:var(--blue2)}
}

/* Chart card */
.chart-card {
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden; margin:2px 0 6px;
  animation:fadeUp 0.3s ease;
  max-width:320px;
}
.cc-header {
  display:flex; align-items:center; gap:10px;
  padding:12px 14px 6px;
}
.cc-icon {
  width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:17px; flex-shrink:0;
}
.cc-meta { flex:1; }
.cc-name { font-family:'Clash Display',sans-serif; font-size:13px; font-weight:600; }
.cc-sym  { font-size:10px; color:var(--muted); }
.cc-price { text-align:right; }
.cc-val  { font-size:16px; font-weight:700; font-family:'DM Mono',monospace; }
.cc-chg  {
  font-size:11px; font-weight:600;
  padding:2px 7px; border-radius:5px; margin-top:2px;
  display:inline-block;
}
.cc-chg.up   { color:var(--green); background:rgba(0,217,126,0.1); }
.cc-chg.down { color:var(--red);   background:rgba(255,77,106,0.1); }
.cc-canvas { padding:0 8px 4px; height:80px; }
canvas.spark { width:100%!important; height:80px!important; }
.cc-stats {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:1px; background:var(--border);
  border-top:1px solid var(--border);
}
.cst { background:var(--s2); padding:8px; text-align:center; }
.cst-l { font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.cst-v { font-size:11px; margin-top:2px; font-family:'DM Mono',monospace; }
.cc-foot {
  padding:7px 14px; font-size:9px; color:var(--muted);
  display:flex; justify-content:space-between;
  border-top:1px solid var(--border);
}
.live-pill {
  display:flex; align-items:center; gap:4px;
  color:var(--green); font-size:9px;
}
.live-d { width:4px;height:4px;border-radius:50%;background:var(--green); animation:pulse 1.5s infinite; }

/* ── Input ── */
.input-area {
  padding:10px 14px 16px;
  border-top:1px solid var(--border);
  background:rgba(5,5,8,0.95);
  backdrop-filter:blur(20px);
  flex-shrink:0;
}
.input-wrap {
  display:flex; gap:9px; align-items:flex-end;
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:14px;
  padding:9px 9px 9px 14px;
  transition:border-color 0.2s;
}
.input-wrap:focus-within {
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(0,82,255,0.1);
}
textarea {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--text); font-family:'DM Mono',monospace;
  font-size:13px; resize:none; line-height:1.5;
  max-height:100px; min-height:22px;
}
textarea::placeholder { color:var(--muted); }
.send {
  width:36px; height:36px; border-radius:10px;
  background:var(--blue); border:none;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; flex-shrink:0;
  transition:all 0.2s;
  box-shadow:0 4px 12px rgba(0,82,255,0.35);
}
.send:hover { background:#0040cc; transform:scale(1.05); }
.send:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.input-hint {
  text-align:center; font-size:9px; color:var(--muted);
  margin-top:7px; letter-spacing:0.5px;
}
</style>
</head>

<div class="blob1"></div>
<div class="blob2"></div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">🔮</div>

    </div>

    <div class="chip" onclick="ask('How to manage crypto portfolio risk?')">📊 Risk</div>

  <!-- Messages -->
  <div class="messages" id="messages">

<script>
// ── Coinbase Mini App SDK init ──────────────────────────
(async () => {
  try {
    if (window.MiniKit) {
      await window.MiniKit.init({ appId: 'YOUR_COINBASE_APP_ID' });
    }
  } catch(e) { console.log('MiniKit not available, running standalone'); }
})();

// ── System Prompt ────────────────────────────────────────
const SYS = `You are CryptoMind AI — an expert Crypto Analysis Assistant built as a Coinbase Wallet Mini App on Base network. Reply in the SAME language the user writes in.

Expertise: Bitcoin, Ethereum, Base network, DeFi, NFT, ERC-20, Technical Analysis, Portfolio management, Crypto security.

CHART TRIGGER — When user asks about price/value of any crypto, include [[CHART:coinId]] in your response:
bitcoin→[[CHART:bitcoin]], ethereum→[[CHART:ethereum]], solana→[[CHART:solana]], binancecoin→[[CHART:binancecoin]], ripple→[[CHART:ripple]], dogecoin→[[CHART:dogecoin]], cardano→[[CHART:cardano]]

Rules: Use Markdown, emojis, be concise for mobile. Never promise profits. Always add risk disclaimer. Max 300 words per response.`;

const COINS = {
  bitcoin:      {name:'Bitcoin',   sym:'BTC',  icon:'₿',  color:'#f7931a'},
  ethereum:     {name:'Ethereum',  sym:'ETH',  icon:'⬡',  color:'#627eea'},
  solana:       {name:'Solana',    sym:'SOL',  icon:'◎',  color:'#9945ff'},
  binancecoin:  {name:'BNB',       sym:'BNB',  icon:'🔶', color:'#f3ba2f'},
  ripple:       {name:'XRP',       sym:'XRP',  icon:'✕',  color:'#00aae4'},
  dogecoin:     {name:'Dogecoin',  sym:'DOGE', icon:'🐕', color:'#c2a633'},
  cardano:      {name:'Cardano',   sym:'ADA',  icon:'₳',  color:'#0033ad'},
};

let history = [];

// ── Coin price (CoinCap — more reliable) ─────────────────
async function fetchPrice(id) {
  try {
    // Map CoinGecko IDs to CoinCap IDs
    const map = {bitcoin:'bitcoin',ethereum:'ethereum',solana:'solana',
      binancecoin:'binance-coin',ripple:'xrp',dogecoin:'dogecoin',cardano:'cardano'};
    const capId = map[id] || id;
    const r = await fetch(`https://api.coincap.io/v2/assets/${capId}`);
    const d = await r.json();
    const a = d.data;
    return {
      price:     parseFloat(a.priceUsd),
      change24h: parseFloat(a.changePercent24Hr),
      volume:    parseFloat(a.volumeUsd24Hr),
      marketCap: parseFloat(a.marketCapUsd),
    };
  } catch(e) { return null; }
}

async function fetchSpark(id) {
  try {
    const map = {bitcoin:'bitcoin',ethereum:'ethereum',solana:'solana',
      binancecoin:'binance-coin',ripple:'xrp',dogecoin:'dogecoin',cardano:'cardano'};
    const capId = map[id] || id;
    const end = Date.now();
    const start = end - 86400000;
    const r = await fetch(`https://api.coincap.io/v2/assets/${capId}/history?interval=h1&start=${start}&end=${end}`);
    const d = await r.json();
    return d.data.map(p => parseFloat(p.priceUsd));
  } catch(e) { return null; }
}

function drawSpark(canvas, prices, up) {
  if(!prices||prices.length<2) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth||300, H=80;
  canvas.width=W; canvas.height=H;
  const mn=Math.min(...prices), mx=Math.max(...prices), rng=mx-mn||1;
  const pts = prices.map((p,i)=>({
    x:(i/(prices.length-1))*W,
    y:H-((p-mn)/rng)*(H*0.78)-H*0.11
  }));
  const col = up ? '#00d97e' : '#ff4d6a';
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, up?'rgba(0,217,126,0.22)':'rgba(255,77,106,0.22)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    const cx=(pts[i-1].x+pts[i].x)/2;
    ctx.bezierCurveTo(cx,pts[i-1].y,cx,pts[i].y,pts[i].x,pts[i].y);
  }
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    const cx=(pts[i-1].x+pts[i].x)/2;
    ctx.bezierCurveTo(cx,pts[i-1].y,cx,pts[i].y,pts[i].x,pts[i].y);
  }
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
  const lp=pts[pts.length-1];
  ctx.beginPath(); ctx.arc(lp.x,lp.y,4,0,Math.PI*2);
  ctx.fillStyle=col; ctx.fill();
}

function fp(p){
  if(p>=1000) return '$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(p>=1)    return '$'+p.toFixed(4);
  return '$'+p.toFixed(6);
}
function fb(n){
  if(n>=1e12) return '$'+(n/1e12).toFixed(2)+'T';
  if(n>=1e9)  return '$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6)  return '$'+(n/1e6).toFixed(2)+'M';
  return '$'+n.toLocaleString();
}

async function renderChart(coinId) {
  const m = COINS[coinId]||{name:coinId,sym:coinId.toUpperCase(),icon:'🪙',color:'#0052ff'};
  const cid = 'c'+Date.now();
  const card = document.createElement('div');
  card.className='chart-card';
  card.innerHTML=`
    <div class="cc-header">
      <div class="cc-icon" style="background:${m.color}22">${m.icon}</div>
      <div class="cc-meta">
        <div class="cc-name">${m.name}</div>
        <div class="cc-sym">${m.sym}/USD</div>
      </div>
      <div class="cc-price">
        <div class="cc-val" id="v${cid}">...</div>
        <div class="cc-chg" id="ch${cid}">—</div>
      </div>
    </div>
    <div class="cc-canvas"><canvas class="spark" id="${cid}"></canvas></div>
    <div class="cc-stats">
      <div class="cst"><div class="cst-l">24h Chg</div><div class="cst-v" id="cg${cid}">—</div></div>
      <div class="cst"><div class="cst-l">Volume</div><div class="cst-v" id="vo${cid}">—</div></div>
      <div class="cst"><div class="cst-l">Mkt Cap</div><div class="cst-v" id="mc${cid}">—</div></div>
    </div>
    <div class="cc-foot">
      <span>CoinCap · Live</span>
      <span class="live-pill"><div class="live-d"></div>LIVE</span>
    </div>`;
  document.getElementById('messages').appendChild(card);
  scrollBottom();
  const [pd,sp] = await Promise.all([fetchPrice(coinId),fetchSpark(coinId)]);
  if(pd){
    const up=pd.change24h>=0;
    document.getElementById('v'+cid).textContent=fp(pd.price);
    const el=document.getElementById('ch'+cid);
    el.textContent=(up?'+':'')+pd.change24h.toFixed(2)+'%';
    el.className='cc-chg '+(up?'up':'down');
    document.getElementById('cg'+cid).textContent=(up?'+':'')+pd.change24h.toFixed(2)+'%';
    document.getElementById('vo'+cid).textContent=fb(pd.volume);
    document.getElementById('mc'+cid).textContent=fb(pd.marketCap);
    if(sp) setTimeout(()=>drawSpark(document.getElementById(cid),sp,up),60);
  }
  scrollBottom();
}

// ── Chat ──────────────────────────────────────────────────
function scrollBottom(){ const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }

function addMsg(role,text){
  const w=document.getElementById('welcome'); if(w) w.remove();
  const c=document.getElementById('messages');
  const d=document.createElement('div'); d.className=`msg ${role}`;
  const av=role==='ai'
    ?`<div class="av ai">🔮</div>`
    :`<div class="av user">👤</div>`;
  d.innerHTML=`${av}<div class="bubble">${role==='ai'?md(text):esc(text)}</div>`;
  c.appendChild(d); scrollBottom();
}

function addTyping(){
  const c=document.getElementById('messages');
  const d=document.createElement('div'); d.className='msg ai typing'; d.id='typing';
  d.innerHTML=`<div class="av ai">🔮</div><div class="bubble"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  c.appendChild(d); scrollBottom();
}
function rmTyping(){ const t=document.getElementById('typing'); if(t)t.remove(); }

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function md(t){
  t=t.replace(/\[\[CHART:[a-z0-9-]+\]\]/g,'');
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h3>$1</h3>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,s=>`<ul>${s}</ul>`)
    .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}

function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function ask(t){ document.getElementById('inp').value=t; sendMsg(); }

async function sendMsg(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim(); if(!text) return;
  inp.value=''; inp.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  addMsg('user',text);
  history.push({role:'user',content:text});
  addTyping();
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:SYS,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:history
      })
    });
    const data=await res.json(); rmTyping();
    let reply='';
    if(data.content) for(const b of data.content) if(b.type==='text') reply+=b.text;
    if(!reply&&data.error) reply=`⚠️ Error: ${data.error.message}`;
    if(reply){
      const charts=[...reply.matchAll(/\[\[CHART:([a-z0-9-]+)\]\]/g)];
      addMsg('ai',reply);
      history.push({role:'assistant',content:data.content||reply});
      for(const c of charts) await renderChart(c[1]);
    }
  } catch(e){
    rmTyping();
    addMsg('ai',`⚠️ Connection error: ${e.message}`);
  }
  document.getElementById('sendBtn').disabled=false;
  document.getElementById('inp').focus();
}
</script>
